# Project configuration for AI agents (Claude, Cursor, Gemini, Codex, etc.)
# when they encounter {{VAR_NAME}} references in skills, commands, templates and docs.
# Variable names are snake_case; the AI maps {{PROJECT_NAME}} -> project.project_name lexically.
# Edit values manually, or run `bun run agents:setup` for an interactive walkthrough.
# Every unfilled field is `null` plus a TODO comment with a concrete example.

project:
  project_name: bunkai-qa-engineering-lpinto # Project name (e.g. MyProject)
  project_key: BK # Project key in issue tracker (e.g. PROJ, ACME, UPEX). The boilerplate ships this `null` on purpose — the consumer project fills it; never hardcode a real key here.
  webapp_domain: upexbunkai.vercel.app # Domain of the web application under test (e.g. myproject.com)

backend:
  backend_repo: ../upex-bunkai-tms # Relative path to backend repository (e.g. ../my-backend)
  backend_stack: Next.js + Supabase + Vercel # Backend technology stack (e.g. Node.js + Express)
  backend_entry: ../upex-bunkai-tms/. # Backend source entry point (e.g. src/)

frontend:
  frontend_repo: ../upex-bunkai-tms # Relative path to frontend repository (e.g. ../my-frontend)
  frontend_stack: Next.js # Frontend technology stack (e.g. React + TypeScript)
  frontend_entry: ../upex-bunkai-tms/. # Frontend source entry point (e.g. src/)

database:
  db_type: Supabase Postgres # Database engine (e.g. PostgreSQL)

issue_tracker:
  issue_tracker: Jira # TODO: Issue tracking tool (e.g. Jira)
  issue_tracker_cli: acli (Jira # CLI command to query tickets (e.g. acli (Jira) / gh issue (GitHub))
  atlassian_url: 'https://upexgalaxy67.atlassian.net' # Atlassian site base URL (e.g. https://company.atlassian.net) — same value as .env's ATLASSIAN_URL

testing:
  default_env: staging # Default testing environment — must match a key under `environments:` (e.g. staging)
  tms_cli: bun xray # Test management CLI command (e.g. bun xray)

qa:
  formal_blocked_gate: true # When true and the substrate exposes a `blocked` story status, FAILED stories dispatch `defect_reported` (in_test -> blocked). When false (or no `blocked` slug), the skill leaves the story in `in_test` with the linked bug — non-strict fallback. See sprint-testing/references/sprint-orchestration.md Briefing 4 Step 5.
  # QA process epics — buckets that hold QA artifacts so they never pollute product epics/roadmap.
  # FOUR QA-process epics form the QA-governance cluster: Test Plans parent to `master_test_plan_epic`;
  # Test (TC) issues parent to `test_repository_epic`; Test Executions/Preconditions/Test Sets parent to
  # `test_artifacts_epic`; Bug/Defect/Improvement parent to `defect_epic`.
  # Skills resolve the epic by NAME (the methodology convention shipped below) and find-or-create it,
  # caching the discovered `*.key` here. NEVER parent a quality issue to a product/dev epic.
  # Read directly by skills (not {{VAR}} tokens) → skipped by vars:check, like git_strategy leaves.
  # Doctrine: .claude/skills/agentic-qa-core/references/defect-management-doctrine.md (Part 4).
  qa_epics:
    master_test_plan_epic:
      name: QA Master Test Plan # the MTP — parent of every Test Plan (FTP/STP/ATP); description mirrors
      # .context/master-test-plan.md + points to the official QA repo; cross-linked to the 3 sibling QA epics
      key: null # discovered/created at runtime, then cached here (e.g. PROJ-100)
    test_repository_epic:
      name: QA Test Repository # convention name; holds every Test (TC) issue
      key: null # discovered/created at runtime, then cached here (e.g. PROJ-456)
    test_artifacts_epic:
      name: QA Test Artifacts # holds every Test Execution (FTR/STR/ATR), Precondition, Test Set
      key: null # discovered/created at runtime, then cached here (e.g. PROJ-789)
    defect_epic:
      name: QA Defect Management # convention name; the `QA ` prefix marks a process epic, not product
      key: null # discovered/created at runtime, then cached here (e.g. PROJ-123)

# Per-environment config. Add/remove environments freely (production, dev, qa, uat, etc.).
# Each environment must define ALL four keys: web_url, api_url, db_mcp, api_mcp.
# Skills referencing {{WEB_URL}} / {{API_URL}} / {{DB_MCP}} / {{API_MCP}} resolve to the
# active environment (`testing.default_env` above, or a session override).
# For explicit cross-env references use {{environments.<env>.<var>}} (e.g. {{environments.local.web_url}}).
environments:
  local:
    web_url: 'http://localhost:3000' # Frontend URL for local env (e.g. http://localhost:3000)
    api_url: 'http://localhost:3000/api' # API base URL for local env (e.g. http://localhost:3000/api)
    db_mcp: local-dbhub # MCP server name for local DB (e.g. myproject-local-db)
    api_mcp: local-openapi # MCP server name for local API (e.g. myproject-local-api)
  staging:
    web_url: 'https://staging-upexbunkai.vercel.app' # Frontend URL for staging env (e.g. https://staging.myproject.com)
    api_url: 'https://staging-upexbunkai.vercel.app/api' # API base URL for staging env (e.g. https://api-staging.myproject.com)
    db_mcp: staging-dbhub # MCP server name for staging DB (e.g. myproject-staging-db)
    api_mcp: staging-openapi # MCP server name for staging API (e.g. myproject-staging-api)

# Git workflow for THIS project — the SOURCE OF TRUTH read by the git-flow-master skill
# before any git/gh operation. Ships `null` (template): on the first git intent git-flow-master
# OFFERS "Strategy Setup" and fills these fields (it never auto-picks). Tracked + frozen by the
# updater (bootstrapOnly), so each project keeps its own. Filled by git-flow-master, NOT by
# `agents:setup`. These leaves are read directly (not {{VAR}} template vars) → skipped by vars:check.
git_strategy:
  strategy: solo-main # null until Strategy Setup runs; then one of: solo-main | main-integration | enterprise | trunk-based | gitflow | github-flow | gitlab-flow | sdet
  description: >
    Single long-lived branch (main); single maintainer (this repo is the boilerplate
    template itself). Work is committed and pushed directly to main (PRs optional).
    Every push to main is effectively a release of the template. No integration branch,
    no promotion path, no hotfix ceremony.
  branches:
    production: main # release / default branch
    integration: null # long-lived integration branch name (e.g. staging), or null
    ephemeral_pattern: null # on-demand trunk pattern (e.g. "test/<module>-suite" for sdet), or null
  protected: [main] # branches requiring explicit confirm before a direct push
  decisions: # captured by the Strategy Setup questionnaire (Q1/Q2/Q3)
    promote_method: n/a # ff-only | merge-commit | squash | n/a
    feature_merge: n/a # merge-commit | squash | rebase-merge | n/a
    hotfix_policy: n/a # branch-off-prod-backmerge | via-integration | none | n/a
  policy: # how strictly protected branches are guarded (set by Strategy Setup Q4; defaults are safe)
    direct_push_to_protected: allowed # forbidden | confirm | allowed (solo-main = allowed)
    admin_bypass: true # team POLICY: may a repo admin bypass PR/protection for urgent changes? actual capability still depends on the GitHub user's role — the skill re-confirms at runtime
    require_pr_reviews: 0 # null | 0 | N — min approvals before merge to a protected branch (informational)
  branch_prefixes:
    precedence: [feat, fix, refactor, test, docs, chore]
    naming_with_key: '{prefix}/{ISSUE-KEY}-{kebab-slug}'
    naming_without_key: '{prefix}/{kebab-slug}'
  meta:
    setup_version: 1
    created: 2026-06-20 # YYYY-MM-DD stamped by Strategy Setup
